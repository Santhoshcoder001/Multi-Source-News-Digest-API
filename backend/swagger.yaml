openapi: 3.0.3
info:
  title: News Digest API
  version: 1.0.0
  description: Multi-source news digest API with article clustering and AI summaries.
servers:
  - url: http://localhost:3001
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
  /api/digest:
    get:
      summary: Get the latest digest
      parameters:
        - in: query
          name: sentiment
          schema:
            type: string
            enum: [positive, neutral, negative]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
        - in: query
          name: date
          schema:
            type: string
            example: '2026-05-20'
      responses:
        '200':
          description: Digest response
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
        '503':
          description: Digest not available yet
  /api/topic/{name}:
    get:
      summary: Search clusters by topic
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Topic response
        '401':
          description: Unauthorized
        '404':
          description: Topic not found
  /api/topics:
    get:
      summary: List all topic names
      responses:
        '200':
          description: Topic list
        '401':
          description: Unauthorized
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key